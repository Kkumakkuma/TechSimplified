title: TechSimplified
description: "Making technology simple. Guides, tips, and how-tos for everyday tech."
url: "https://kkumakkuma.github.io"
baseurl: "/TechSimplified"
permalink: /:year/:month/:day/:title/
future: true

theme: minima

author:
  name: TechSimplified
  email: ""

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true

google_analytics: "G-4QW5Q7KM9S"

exclude:
  - scripts/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock

# Social / Pinterest
social:
  name: SmartTemplates
  links:
    - https://pinterest.com/smarttemplates
